<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Baseball Lineup</title>
<style>
  :root {
    --grass: #4a8b3b;
    --grass-dark: #356a29;
    --dirt: #b9874a;
    --dirt-dark: #8a5f30;
    --line: #ffffff;
    --bg: #f4f1ea;
    --panel: #ffffff;
    --ink: #1f2937;
    --muted: #6b7280;
    --accent: #b91c1c;
    --accent-2: #1d4ed8;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--ink);
    background: var(--bg);
    min-height: 100vh;
  }
  header {
    padding: 14px 20px;
    background: var(--panel);
    border-bottom: 1px solid #e5e7eb;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 18px;
    margin: 0;
    letter-spacing: .3px;
  }
  header h1 span { color: var(--accent); }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; }
  button, .btn {
    font: inherit;
    border: 1px solid #d1d5db;
    background: #fff;
    color: var(--ink);
    padding: 7px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background .15s, border-color .15s, transform .05s;
  }
  button:hover { background: #f3f4f6; }
  button:active { transform: translateY(1px); }
  button.primary { background: var(--accent-2); color: white; border-color: var(--accent-2); }
  button.primary:hover { background: #1e40af; }
  button.danger { color: var(--accent); border-color: #fecaca; }
  button.danger:hover { background: #fef2f2; }

  main {
    display: grid;
    grid-template-columns: 320px 1fr 280px;
    gap: 16px;
    padding: 16px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .panel {
    background: var(--panel);
    border-radius: 10px;
    box-shadow: var(--shadow);
    padding: 14px;
  }
  .panel h2 {
    margin: 0 0 10px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  /* roster */
  .roster-input { display: flex; gap: 6px; margin-bottom: 10px; }
  .roster-input input {
    flex: 1;
    padding: 7px 10px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font: inherit;
  }
  .roster-input input:focus { outline: 2px solid var(--accent-2); outline-offset: -1px; }
  .roster-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-height: 40px;
  }
  .player {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 8px;
    background: #fafaf7;
    border: 1px solid #e7e5e0;
    border-radius: 6px;
    cursor: grab;
    user-select: none;
  }
  .player:hover { background: #f3f1ea; }
  .player.dragging { opacity: .4; }
  .player.placed { opacity: .55; font-style: italic; }
  .player .name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .player .pos-tag {
    font-size: 10px;
    padding: 2px 5px;
    background: #e5e7eb;
    border-radius: 3px;
    color: var(--muted);
    font-weight: 600;
  }
  .player .x {
    cursor: pointer;
    color: var(--muted);
    padding: 0 4px;
    font-size: 16px;
    line-height: 1;
  }
  .player .x:hover { color: var(--accent); }

  /* field */
  .field-wrap {
    background: var(--panel);
    border-radius: 10px;
    box-shadow: var(--shadow);
    padding: 14px;
    display: flex;
    flex-direction: column;
  }
  .field-wrap h2 {
    margin: 0;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--muted);
  }
  .field-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .field-header h2 { white-space: nowrap; }
  .inning-tabs { display: flex; gap: 4px; flex: 1; flex-wrap: wrap; }
  .inning-tab {
    width: 32px;
    height: 32px;
    border: 1px solid #d1d5db;
    background: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 700;
    font-size: 13px;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 0;
  }
  .inning-tab:hover { background: #f3f4f6; }
  .inning-tab.active {
    background: var(--accent-2);
    border-color: var(--accent-2);
    color: white;
  }
  .inning-tab .dot {
    position: absolute;
    bottom: 3px;
    right: 3px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
  }
  .inning-tab.active .dot { background: white; }
  .inning-actions { display: flex; gap: 4px; }
  .inning-actions .btn { font-size: 11px; padding: 4px 8px; }
  .field {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--grass);
    border-radius: 8px;
    overflow: hidden;
    background-image: repeating-linear-gradient(
      45deg,
      var(--grass) 0 24px,
      var(--grass-dark) 24px 48px
    );
  }
  .slot {
    position: absolute;
    transform: translate(-50%, -50%);
    width: 78px;
    height: 78px;
    border-radius: 50%;
    background: rgba(255,255,255,.18);
    border: 2px dashed rgba(255,255,255,.55);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
    font-size: 11px;
    text-shadow: 0 1px 2px rgba(0,0,0,.4);
    cursor: pointer;
    transition: background .15s, transform .15s, border-color .15s;
  }
  .slot:hover { background: rgba(255,255,255,.3); }
  .slot.over {
    background: rgba(255, 235, 59, .35);
    border-color: #ffeb3b;
    transform: translate(-50%, -50%) scale(1.08);
  }
  .slot .pos {
    font-weight: 700;
    font-size: 14px;
    line-height: 1;
    margin-bottom: 2px;
  }
  .slot .label { font-size: 9px; opacity: .9; line-height: 1; }
  .slot.filled {
    background: white;
    color: var(--ink);
    text-shadow: none;
    border: 2px solid #1f2937;
  }
  .slot.filled .pos { color: var(--accent); }
  .slot.filled .who {
    font-size: 11px;
    font-weight: 600;
    margin-top: 3px;
    padding: 0 4px;
    line-height: 1.1;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .slot .clear {
    position: absolute;
    top: -4px;
    right: -4px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    font-size: 12px;
    line-height: 16px;
    text-align: center;
    cursor: pointer;
    display: none;
    border: 2px solid white;
  }
  .slot.filled .clear { display: block; }

  /* diamond decorations */
  .diamond-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  /* batting order */
  .batting-list {
    list-style: none;
    margin: 0;
    padding: 0;
    counter-reset: bat;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .bat-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 8px;
    background: #fafaf7;
    border: 1px solid #e7e5e0;
    border-radius: 6px;
    cursor: grab;
    user-select: none;
  }
  .bat-item.dragging { opacity: .4; }
  .bat-item.over { border-color: var(--accent-2); background: #eff6ff; }
  .bat-item .num {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 11px;
    flex-shrink: 0;
  }
  .bat-item .name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bat-item .pos-tag { font-size: 10px; color: var(--muted); font-weight: 600; }
  .bat-item.empty { color: var(--muted); font-style: italic; cursor: default; }
  .bat-item.empty .num { background: #d1d5db; }

  .hint { color: var(--muted); font-size: 11px; margin-top: 8px; }

  /* print mini-fields (only visible when printing) */
  .print-innings { display: none; }
  .print-inning-card { break-inside: avoid; page-break-inside: avoid; }
  .print-mini-field {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    background: white;
    border: 1px solid #999;
    border-radius: 4px;
    overflow: hidden;
  }
  .print-mini-field .slot {
    width: 22%;
    height: 22%;
    border: 1px solid #333;
    background: white;
    color: black;
    text-shadow: none;
    font-size: 7px;
  }
  .print-mini-field .slot:not(.filled) { opacity: .35; border-style: dashed; }
  .print-mini-field .slot .pos { font-size: 9px; color: var(--accent); margin: 0; }
  .print-mini-field .slot .who {
    font-size: 7px;
    line-height: 1.05;
    margin-top: 1px;
    padding: 0 2px;
    font-weight: 600;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    text-align: center;
  }
  .print-inning-title {
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    margin: 0 0 3px;
    color: var(--accent-2);
  }

  /* print */
  @media print {
    body { background: white; }
    header, .toolbar, .roster-input, .player .x, .slot.filled .clear,
    .panel h2 .btn, .hint, .roster-panel, .clear-all-btn,
    .field-wrap, .field-header, .inning-tabs, .inning-actions {
      display: none !important;
    }
    main {
      display: block !important;
      max-width: none;
      gap: 0;
      padding: 0;
    }
    main > .panel:last-child {
      /* Batting order panel — show as a simple list */
      box-shadow: none;
      border: 1px solid #ccc;
      padding: 8px;
      margin-top: 8px;
    }
    .print-innings {
      display: grid !important;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 8px;
    }
    .print-title {
      display: block !important;
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .print-date { display: block !important; text-align: center; font-size: 11px; color: #666; margin-bottom: 10px; }
    @page { margin: 0.35in; }
  }
  .print-title, .print-date { display: none; }
</style>
</head>
<body>

<header>
  <h1>⚾ Baseball Lineup <span>Builder</span></h1>
  <div class="toolbar">
    <button id="btnAutoFill">Auto-fill Batting Order</button>
    <button class="danger clear-all-btn" id="btnClearAll">Clear All</button>
    <button class="primary" id="btnPrint">🖨 Print Lineup</button>
  </div>
</header>

<div class="print-title" id="printTitle">Team Lineup</div>
<div class="print-date" id="printDate"></div>

<div class="print-innings" id="printInnings"></div>

<main>
  <!-- Roster -->
  <section class="panel roster-panel">
    <h2>Roster <span id="rosterCount" style="font-weight:400;text-transform:none;letter-spacing:0;"></span></h2>
    <form class="roster-input" id="rosterForm">
      <input id="playerInput" type="text" placeholder="Player name" autocomplete="off" maxlength="40" />
      <button class="primary" type="submit">Add</button>
    </form>
    <ul class="roster-list" id="rosterList"></ul>
    <p class="hint">Drag players onto the field. Click an X to remove.</p>
  </section>

  <!-- Field -->
  <section class="field-wrap">
    <div class="field-header">
      <h2>Defensive Lineup</h2>
      <div class="inning-tabs" id="inningTabs"></div>
      <div class="inning-actions">
        <button class="btn" id="btnCopyPrev" title="Copy previous inning's lineup into this one">⧉ Copy from prev</button>
        <button class="btn danger" id="btnClearInning" title="Clear this inning's positions">Clear inning</button>
      </div>
    </div>
    <div class="field" id="field">
      <svg class="diamond-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
        <!-- outfield grass arc / warning track -->
        <path d="M 5 70 Q 50 -10 95 70 L 95 95 L 5 95 Z" fill="#3d7a31" opacity=".55"/>
        <!-- infield dirt -->
        <circle cx="50" cy="68" r="22" fill="#b9874a"/>
        <!-- infield grass -->
        <polygon points="50,57 62,68 50,79 38,68" fill="#4a8b3b"/>
        <!-- bases -->
        <rect x="48.5" y="77.5" width="3" height="3" fill="#fff" stroke="#333" stroke-width=".3"/>
        <rect x="60.5" y="66.5" width="3" height="3" fill="#fff" stroke="#333" stroke-width=".3"/>
        <rect x="48.5" y="55.5" width="3" height="3" fill="#fff" stroke="#333" stroke-width=".3"/>
        <rect x="36.5" y="66.5" width="3" height="3" fill="#fff" stroke="#333" stroke-width=".3"/>
        <!-- pitcher's mound -->
        <circle cx="50" cy="68" r="2.5" fill="#d4a06a"/>
        <!-- foul lines -->
        <line class="grass-line" x1="50" y1="79" x2="5" y2="34" stroke="#fff" stroke-width=".4"/>
        <line class="grass-line" x1="50" y1="79" x2="95" y2="34" stroke="#fff" stroke-width=".4"/>
      </svg>
      <!-- Position slots positioned as % of field -->
      <!-- Standard baseball field positions -->
    </div>
    <p class="hint">Drag a player onto a position. Drop on an occupied slot to swap. Click ✕ to clear.</p>
  </section>

  <!-- Batting order -->
  <section class="panel">
    <h2>Batting Order
      <button class="btn" id="btnAutoFill2" style="font-size:11px;padding:3px 7px;">Auto-fill</button>
    </h2>
    <ol class="batting-list" id="battingList"></ol>
    <p class="hint">Drag to reorder. Auto-fill pulls from the field.</p>
  </section>
</main>

<script>
// ============================================================
// Position definitions — coordinates in % of the field box
// ============================================================
const POSITIONS = [
  { id: "P",  label: "Pitcher",      x: 50, y: 68 },
  { id: "C",  label: "Catcher",      x: 50, y: 91 },
  { id: "1B", label: "First Base",   x: 65, y: 68 },
  { id: "2B", label: "Second Base",  x: 57, y: 56 },
  { id: "3B", label: "Third Base",   x: 35, y: 68 },
  { id: "SS", label: "Shortstop",    x: 43, y: 56 },
  { id: "LF", label: "Left Field",   x: 22, y: 30 },
  { id: "CF", label: "Center Field", x: 50, y: 18 },
  { id: "RF", label: "Right Field",  x: 78, y: 30 },
];

// ============================================================
// State + persistence
// ============================================================
const STORAGE_KEY = "baseball-lineup-v1";
const NUM_INNINGS = 6;

function emptyLineups() {
  const o = {};
  for (let i = 1; i <= NUM_INNINGS; i++) o[i] = {};
  return o;
}

const state = {
  players: [],          // [{ id, name }]
  lineups: emptyLineups(), // { 1: {positionId: playerId}, 2: {...}, ... 6: {...} }
  battingOrder: [],     // [playerId, ...]  shared across all innings
  currentInning: 1,
};

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    // localStorage may be blocked in some sandboxes — ignore
  }
}
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    // Migrate old single-assignments format → lineups[1]
    if (data.assignments && !data.lineups) {
      data.lineups = emptyLineups();
      data.lineups[1] = data.assignments;
      delete data.assignments;
    }
    if (!data.lineups) data.lineups = emptyLineups();
    // Make sure all 6 inning keys exist
    for (let i = 1; i <= NUM_INNINGS; i++) {
      if (!data.lineups[i]) data.lineups[i] = {};
    }
    if (!data.currentInning) data.currentInning = 1;
    Object.assign(state, data);
  } catch (e) {}
}

function currentLineup() {
  return state.lineups[state.currentInning];
}
const uid = () => Math.random().toString(36).slice(2, 9);

// ============================================================
// Player roster
// ============================================================
function addPlayerFromInput(e) {
  e.preventDefault();
  const input = document.getElementById("playerInput");
  const name = input.value.trim();
  if (!name) return;
  state.players.push({ id: uid(), name });
  input.value = "";
  save();
  renderAll();
  input.focus();
}

function removePlayer(id) {
  state.players = state.players.filter(p => p.id !== id);
  // Remove this player from all innings' lineups
  for (let i = 1; i <= NUM_INNINGS; i++) {
    const lineup = state.lineups[i];
    for (const pos in lineup) {
      if (lineup[pos] === id) delete lineup[pos];
    }
  }
  state.battingOrder = state.battingOrder.filter(pid => pid !== id);
  save();
  renderAll();
}

function getPlayer(id) {
  return state.players.find(p => p.id === id);
}

// Position in the *currently selected* inning (used in roster sidebar)
function getPlayerPosition(playerId) {
  for (const [pos, pid] of Object.entries(currentLineup())) {
    if (pid === playerId) return pos;
  }
  return null;
}

// Position in a specific inning (used by batting-order tag, optional)
function getPlayerPositionInInning(playerId, inning) {
  const lineup = state.lineups[inning];
  if (!lineup) return null;
  for (const [pos, pid] of Object.entries(lineup)) {
    if (pid === playerId) return pos;
  }
  return null;
}

function renderRoster() {
  const list = document.getElementById("rosterList");
  list.innerHTML = "";
  for (const p of state.players) {
    const li = document.createElement("li");
    const placed = getPlayerPosition(p.id);
    li.className = "player" + (placed ? " placed" : "");
    li.draggable = true;
    li.dataset.playerId = p.id;
    li.innerHTML = `
      <span class="name">${escapeHtml(p.name)}</span>
      ${placed ? `<span class="pos-tag">${placed}</span>` : ""}
      <span class="x" title="Remove player">×</span>
    `;
    li.querySelector(".x").addEventListener("click", e => {
      e.stopPropagation();
      removePlayer(p.id);
    });
    li.addEventListener("dragstart", e => {
      e.dataTransfer.setData("text/player-id", p.id);
      e.dataTransfer.effectAllowed = "move";
      li.classList.add("dragging");
    });
    li.addEventListener("dragend", () => li.classList.remove("dragging"));
    list.appendChild(li);
  }
  document.getElementById("rosterCount").textContent =
    state.players.length ? `(${state.players.length})` : "";
}

// ============================================================
// Field
// ============================================================
function renderInningTabs() {
  const wrap = document.getElementById("inningTabs");
  wrap.innerHTML = "";
  for (let i = 1; i <= NUM_INNINGS; i++) {
    const btn = document.createElement("button");
    btn.className = "inning-tab" + (i === state.currentInning ? " active" : "");
    btn.title = `Inning ${i}`;
    btn.textContent = i;
    const filledCount = Object.values(state.lineups[i]).filter(Boolean).length;
    if (filledCount > 0) {
      const dot = document.createElement("span");
      dot.className = "dot";
      dot.title = `${filledCount} filled`;
      btn.appendChild(dot);
    }
    btn.addEventListener("click", () => {
      state.currentInning = i;
      save();
      renderAll();
    });
    wrap.appendChild(btn);
  }
}

function renderField() {
  const field = document.getElementById("field");
  // remove old slots only
  field.querySelectorAll(".slot").forEach(n => n.remove());

  const lineup = currentLineup();

  for (const pos of POSITIONS) {
    const playerId = lineup[pos.id];
    const player = playerId ? getPlayer(playerId) : null;
    const slot = document.createElement("div");
    slot.className = "slot" + (player ? " filled" : "");
    slot.style.left = pos.x + "%";
    slot.style.top = pos.y + "%";
    slot.dataset.position = pos.id;
    slot.draggable = !!player;

    slot.innerHTML = `
      <div class="pos">${pos.id}</div>
      ${player
        ? `<div class="who">${escapeHtml(player.name)}</div>
           <div class="clear" title="Remove from position">×</div>`
        : `<div class="label">${pos.label}</div>`}
    `;

    if (player) {
      slot.querySelector(".clear").addEventListener("click", e => {
        e.stopPropagation();
        delete currentLineup()[pos.id];
        save();
        renderAll();
      });
      slot.addEventListener("dragstart", e => {
        e.dataTransfer.setData("text/player-id", player.id);
        e.dataTransfer.setData("text/from-position", pos.id);
        e.dataTransfer.effectAllowed = "move";
        slot.classList.add("dragging");
      });
      slot.addEventListener("dragend", () => slot.classList.remove("dragging"));
    }

    slot.addEventListener("dragover", e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      slot.classList.add("over");
    });
    slot.addEventListener("dragleave", () => slot.classList.remove("over"));
    slot.addEventListener("drop", e => {
      e.preventDefault();
      slot.classList.remove("over");
      const playerId = e.dataTransfer.getData("text/player-id");
      const fromPosition = e.dataTransfer.getData("text/from-position");
      if (!playerId) return;
      assignPlayerToPosition(playerId, pos.id, fromPosition || null);
    });

    field.appendChild(slot);
  }
}

function assignPlayerToPosition(playerId, targetPos, fromPos) {
  const lineup = currentLineup();
  const currentlyHere = lineup[targetPos];
  // Remove player from any other position in THIS inning only
  for (const p in lineup) {
    if (lineup[p] === playerId) delete lineup[p];
  }
  // If we displaced someone and we came from another slot, swap
  if (currentlyHere && fromPos && currentlyHere !== playerId) {
    lineup[fromPos] = currentlyHere;
  }
  lineup[targetPos] = playerId;
  save();
  renderAll();
}

function copyFromPreviousInning() {
  if (state.currentInning <= 1) {
    alert("No previous inning to copy from.");
    return;
  }
  const prev = state.lineups[state.currentInning - 1];
  state.lineups[state.currentInning] = { ...prev };
  save();
  renderAll();
}

function clearCurrentInning() {
  if (!confirm(`Clear all positions for inning ${state.currentInning}?`)) return;
  state.lineups[state.currentInning] = {};
  save();
  renderAll();
}

// ============================================================
// Batting order
// ============================================================
function renderBattingOrder() {
  const list = document.getElementById("battingList");
  list.innerHTML = "";
  const slotsToShow = Math.max(12, state.battingOrder.length);

  for (let i = 0; i < slotsToShow; i++) {
    const playerId = state.battingOrder[i];
    const player = playerId ? getPlayer(playerId) : null;
    const li = document.createElement("li");
    li.className = "bat-item" + (player ? "" : " empty");
    li.dataset.index = i;
    if (player) li.draggable = true;
    const posTag = player ? getPlayerPosition(player.id) : null;
    li.innerHTML = `
      <span class="num">${i + 1}</span>
      <span class="name">${player ? escapeHtml(player.name) : "— empty —"}</span>
      ${posTag ? `<span class="pos-tag">${posTag}</span>` : ""}
    `;

    if (player) {
      li.addEventListener("dragstart", e => {
        e.dataTransfer.setData("text/bat-index", String(i));
        e.dataTransfer.setData("text/player-id", player.id);
        e.dataTransfer.effectAllowed = "move";
        li.classList.add("dragging");
      });
      li.addEventListener("dragend", () => li.classList.remove("dragging"));
    }

    li.addEventListener("dragover", e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      li.classList.add("over");
    });
    li.addEventListener("dragleave", () => li.classList.remove("over"));
    li.addEventListener("drop", e => {
      e.preventDefault();
      li.classList.remove("over");
      const fromIdxRaw = e.dataTransfer.getData("text/bat-index");
      const playerId = e.dataTransfer.getData("text/player-id");
      const targetIdx = i;
      if (fromIdxRaw !== "") {
        // reorder within batting list
        const fromIdx = parseInt(fromIdxRaw, 10);
        reorderBatting(fromIdx, targetIdx);
      } else if (playerId) {
        // dropped a player from roster or field into the batting order
        placeInBattingSlot(playerId, targetIdx);
      }
    });

    list.appendChild(li);
  }
}

function reorderBatting(from, to) {
  if (from === to) return;
  const arr = [...state.battingOrder];
  // pad with nulls to keep alignment if dropping past end
  while (arr.length <= Math.max(from, to)) arr.push(null);
  const [moved] = arr.splice(from, 1);
  arr.splice(to, 0, moved);
  // trim trailing nulls
  while (arr.length && arr[arr.length - 1] == null) arr.pop();
  state.battingOrder = arr;
  save();
  renderAll();
}

function placeInBattingSlot(playerId, idx) {
  // Remove this player from order if present
  const arr = state.battingOrder.filter(id => id !== playerId);
  while (arr.length < idx) arr.push(null);
  arr.splice(idx, 0, playerId);
  // Trim trailing nulls
  while (arr.length && arr[arr.length - 1] == null) arr.pop();
  state.battingOrder = arr;
  save();
  renderAll();
}

function autoFillBattingOrder() {
  // Use everyone fielded in the *currently selected* inning, in standard
  // position order, appending any roster players not yet in the order.
  const lineup = currentLineup();
  const fielded = POSITIONS
    .map(p => lineup[p.id])
    .filter(Boolean);
  const seen = new Set(fielded);
  const remaining = state.players
    .map(p => p.id)
    .filter(id => !seen.has(id));
  state.battingOrder = [...fielded, ...remaining];
  save();
  renderAll();
}

// ============================================================
// Misc
// ============================================================
function clearAll() {
  if (!confirm("Clear roster, all 6 inning lineups, and batting order?")) return;
  state.players = [];
  state.lineups = emptyLineups();
  state.battingOrder = [];
  state.currentInning = 1;
  save();
  renderAll();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function updatePrintDate() {
  const d = new Date();
  document.getElementById("printDate").textContent =
    d.toLocaleDateString(undefined, { year: "numeric", month: "long", day: "numeric" });
}

// Build 6 mini-fields for print output
function renderPrintInnings() {
  const wrap = document.getElementById("printInnings");
  wrap.innerHTML = "";
  for (let i = 1; i <= NUM_INNINGS; i++) {
    const lineup = state.lineups[i];
    const card = document.createElement("div");
    card.className = "print-inning-card";
    let slotsHtml = "";
    for (const pos of POSITIONS) {
      const playerId = lineup[pos.id];
      const player = playerId ? getPlayer(playerId) : null;
      const filledClass = player ? " filled" : "";
      const inner = player
        ? `<div class="pos">${pos.id}</div><div class="who">${escapeHtml(player.name)}</div>`
        : `<div class="pos">${pos.id}</div>`;
      slotsHtml += `<div class="slot${filledClass}" style="left:${pos.x}%;top:${pos.y}%;">${inner}</div>`;
    }
    card.innerHTML = `
      <div class="print-inning-title">Inning ${i}</div>
      <div class="print-mini-field">
        <svg class="diamond-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
          <circle cx="50" cy="68" r="22" fill="#eee" stroke="#999" stroke-width=".3"/>
          <polygon points="50,57 62,68 50,79 38,68" fill="white" stroke="#999" stroke-width=".3"/>
          <line x1="50" y1="79" x2="5" y2="34" stroke="#999" stroke-width=".4"/>
          <line x1="50" y1="79" x2="95" y2="34" stroke="#999" stroke-width=".4"/>
        </svg>
        ${slotsHtml}
      </div>
    `;
    wrap.appendChild(card);
  }
}

function renderAll() {
  renderRoster();
  renderInningTabs();
  renderField();
  renderBattingOrder();
  renderPrintInnings();
}

// Event wiring (avoid inline handlers — some sandboxes block them)
document.getElementById("rosterForm").addEventListener("submit", addPlayerFromInput);
document.getElementById("btnAutoFill").addEventListener("click", autoFillBattingOrder);
document.getElementById("btnAutoFill2").addEventListener("click", autoFillBattingOrder);
document.getElementById("btnClearAll").addEventListener("click", clearAll);
document.getElementById("btnCopyPrev").addEventListener("click", copyFromPreviousInning);
document.getElementById("btnClearInning").addEventListener("click", clearCurrentInning);
document.getElementById("btnPrint").addEventListener("click", () => window.print());

// Boot
load();
updatePrintDate();
renderAll();
</script>
